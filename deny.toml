# Configuration for cargo-deny
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
ignore = [
    # bincode 1.3.3 is unmaintained but considered complete by its authors
    "RUSTSEC-2025-0141",
    # paste is unmaintained; pulled in transitively by ratatui
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Zlib",
    "GPL-3.0-only",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
